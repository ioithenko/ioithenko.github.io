<!DOCTYPE html>
<html lang="ru">
<head>
  {{ partial "head" . }}

  <link rel="stylesheet" href="/css/auth.css">
  
  <!-- Firebase SDK -->
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.2/firebase-app.js";
    import { 
      getAuth, 
      signInWithEmailAndPassword,
      setPersistence,
      browserSessionPersistence,
      browserLocalPersistence,
      onAuthStateChanged
    } from "https://www.gstatic.com/firebasejs/9.22.2/firebase-auth.js";

    // Firebase config
    const firebaseConfig = {
      apiKey: "AIzaSyBOgF_Ugu3KCqb26VDd1CtRs6dECJK7g4U",
      authDomain: "purecheck.firebaseapp.com",
      projectId: "purecheck",
      storageBucket: "purecheck.firebasestorage.app",
      messagingSenderId: "1077616945405",
      appId: "1:1077616945405:web:02f01694ac5cba34a13694",
      measurementId: "G-BSGH7E645X"
    };

    // Initialize Firebase
    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);

    // Auth state listener
    onAuthStateChanged(auth, (user) => {
      const currentPath = window.location.pathname;
      if (user && currentPath === '/login') {
        window.location.href = '/dashboard';
      }
      if (!user && currentPath === '/dashboard') {
        window.location.href = '/login';
      }
    });

    // Login handler
    async function handleLogin(e) {
      e.preventDefault();
      
      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;
      const rememberMe = document.getElementById('remember').checked;

      try {
        await setPersistence(
          auth,
          rememberMe ? browserLocalPersistence : browserSessionPersistence
        );
        
        await signInWithEmailAndPassword(auth, email, password);
      } catch (error) {
        showError(error.message);
      }
    }

    // Show error message
    function showError(message) {
      const errorDiv = document.getElementById('error-message');
      errorDiv.textContent = message;
      errorDiv.style.display = 'block';
      setTimeout(() => errorDiv.style.display = 'none', 5000);
    }

    // Form submit listener
    document.getElementById('login-form')
      .addEventListener('submit', handleLogin);
  </script>

  <style>
    /* Ваши существующие стили */
    #error-message {
      display: none;
      padding: 10px;
      background: #ffebee;
      color: #c62828;
      border-radius: 4px;
      margin-top: 15px;
    }
  </style>
</head>

<body class="auth-page">
  {{ partial "header" . }}

  <main class="auth-main">
    <div class="auth-container">
  <div class="auth-decoration decoration-1"></div>
  <div class="auth-decoration decoration-2"></div>
  
  <h1 class="auth-title">Добро пожаловать</h1>
  
  <form class="auth-form" id="login-form">
    <div class="auth-input-group">
      <span class="auth-input-icon">✉️</span>
      <input 
        id="email" 
        type="email" 
        placeholder="Ваш email" 
        class="auth-input"
        required
      >
    </div>
    
    <div class="auth-input-group">
      <span class="auth-input-icon">🔒</span>
      <input 
        id="password" 
        type="password" 
        placeholder="Пароль" 
        class="auth-input"
        required
      >
    </div>
    
    <button class="auth-button" type="submit">
      Войти
    </button>
    
    <div id="error-message" style="color: #e63946; margin-top: 1rem;"></div>
  </form>
  

</div>
  </main>

</body>
</html>
